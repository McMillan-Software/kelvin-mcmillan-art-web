name: Deploy React App to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
       VITE_API_URL: ${{ secrets.VITE_API_URL }}
       VITE_IMAGE_BASE_PATH: ${{ secrets.VITE_IMAGE_BASE_PATH}}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install pnpm, dependencies & build
        run: |
          npm install -g pnpm
          pnpm install
          pnpm build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_IMAGE_BASE_PATH: ${{ secrets.VITE_IMAGE_BASE_PATH }}


      - name: Copy build to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist/*"
          target: "/var/www/kelvin-mcmillan-art-web/"

      - name: Restart Nginx on EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl restart nginx
