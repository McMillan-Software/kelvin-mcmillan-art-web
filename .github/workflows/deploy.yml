name: Deploy React App to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm, dependencies & build
        run: |
          npm install -g pnpm
          pnpm install
          pnpm build

      - name: Copy build build to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist/*"
          target: "/var/www/kelvin-mcmillan-art-web/"

      - name: Copy nginx config to EC2 temp folder
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy/nginx.conf"
          target: "/home/ubuntu/temp-nginx/"

      - name: Move nginx config into sites-available
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo mv /home/ubuntu/temp-nginx/deploy/nginx.conf /etc/nginx/sites-available/kelvin-mcmillan-art-web
            sudo ln -sf /etc/nginx/sites-available/kelvin-mcmillan-art-web /etc/nginx/sites-enabled/
            sudo nginx -t
            sudo systemctl reload nginx
