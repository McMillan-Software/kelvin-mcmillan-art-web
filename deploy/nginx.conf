server {
    listen 80;
    server_name _;

    root /var/www/kelvin-mcmillan-art-web;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html =404;
    }

    location = /index.html {
        # Serve index.html directly to prevent recursion
        try_files $uri =404;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}