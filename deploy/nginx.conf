server {
    server_name mcmillansoftware.xyz www.mcmillansoftware.xyz;

    root /var/www/kelvin-mcmillan-art-web/dist;
    index index.html;

    client_max_body_size 10M;

     # Include backend API routes
    include /etc/nginx/sites-available/backend-locations.conf;

    # Frontend routes (must come after backend routes)
    location / {
        try_files $uri /index.html;
    }

    location ~ /\. {
        deny all;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/mcmillansoftware.xyz/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/mcmillansoftware.xyz/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}server {
    # redirect http to https
    listen 80; 
    server_name mcmillansoftware.xyz www.mcmillansoftware.xyz;
    return 301 https://$host$request_uri;
}